version: 2.1

orbs:
  node: circleci/node@5.2.0

executors:
  node_executor:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project

commands:
  restore_node_cache:
    steps:
      - restore_cache:
          keys:
            # 1) cache exacto por lockfile
            - v1-node-deps-{{ checksum "package-lock.json" }}
            # 2) fallback general
            - v1-node-deps-

  save_node_cache:
    steps:
      - save_cache:
          key: v1-node-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

jobs:
  checkout_and_install:
    executor: node_executor
    steps:
      - checkout

      - restore_node_cache

      - run:
          name: Install dependencies
          command: |
            node -v
            npm -v
            npm ci

      - save_node_cache

      # Guardamos el repo + node_modules en workspace para no reinstalar en cada job
      - persist_to_workspace:
          root: .
          paths:
            - .

  lint:
    executor: node_executor
    steps:
      - attach_workspace:
          at: ~/project

      - run:
          name: Lint
          command: |
            # Ajusta estos scripts a los tuyos
            # package.json -> "lint": "eslint ."
            npm run lint

  unit_tests:
    executor: node_executor
    steps:
      - attach_workspace:
          at: ~/project

      - run:
          name: Unit tests (Jest example) + JUnit output
          command: |
            mkdir -p test-results/junit
            # Si usas jest-junit:
            # npm i -D jest-junit
            # y setear JEST_JUNIT_OUTPUT
            export JEST_JUNIT_OUTPUT="test-results/junit/jest.xml"
            npm test

      # Esto te llena el tab "Tests" en CircleCI
      - store_test_results:
          path: test-results

      # También puedes guardar los reportes como artifacts
      - store_artifacts:
          path: test-results
          destination: test-results

  build:
    executor: node_executor
    steps:
      - attach_workspace:
          at: ~/project

      - run:
          name: Build
          command: |
            # Ajusta a tu script
            # package.json -> "build": "vite build" o "next build" etc.
            npm run build

      - run:
          name: Empaquetar build como artifact
          command: |
            mkdir -p artifacts
            # Cambia "dist" por "build" o ".next" dependiendo de tu framework
            if [ -d dist ]; then
              tar -czf artifacts/build-dist.tgz dist
            elif [ -d build ]; then
              tar -czf artifacts/build-dist.tgz build
            elif [ -d .next ]; then
              tar -czf artifacts/build-dist.tgz .next
            else
              echo "No encontré dist/build/.next. Ajusta esta parte a tu repo."
              exit 1
            fi

            echo "commit: ${CIRCLE_SHA1}" > artifacts/build-info.txt
            echo "branch: ${CIRCLE_BRANCH}" >> artifacts/build-info.txt
            echo "build_num: ${CIRCLE_BUILD_NUM}" >> artifacts/build-info.txt

      # Estos son los artifacts que verás en el tab "Artifacts"
      - store_artifacts:
          path: artifacts
          destination: artifacts

      # Si luego quieres un job de deploy, puedes pasarle el build empaquetado por workspace
      - persist_to_workspace:
          root: .
          paths:
            - artifacts

  integration_tests:
    executor: node_executor
    steps:
      - attach_workspace:
          at: ~/project

      - run:
          name: Integration tests (placeholder)
          command: |
            # Aquí normalmente levantarías servicios con docker-compose,
            # o usarías endpoints de un env de test.
            # Ejemplo:
            # npm run test:integration
            echo "Aquí van los integration tests"

      - run:
          name: Guardar logs/reportes de integration test
          command: |
            mkdir -p artifacts/integration
            echo "integration test logs placeholder" > artifacts/integration/log.txt

      - store_artifacts:
          path: artifacts/integration
          destination: artifacts/integration

  deploy_preprod_manual:
    executor: node_executor
    steps:
      - attach_workspace:
          at: ~/project

      - run:
          name: Deploy a preprod (manual gate)
          command: |
            echo "Aquí iría tu deploy real a preprod."
            echo "Artifact disponible en: ~/project/artifacts"
            ls -la artifacts || true

workflows:
  ci_pipeline:
    jobs:
      - checkout_and_install

      - lint:
          requires:
            - checkout_and_install

      - unit_tests:
          requires:
            - checkout_and_install

      - build:
          requires:
            - lint
            - unit_tests

      - integration_tests:
          requires:
            - build

      # Deploy manual (solo en main por ejemplo)
      - deploy_preprod_manual:
          type: approval
          requires:
            - integration_tests
          filters:
            branches:
              only: main
